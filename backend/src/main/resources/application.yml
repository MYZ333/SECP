server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: hda-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hda_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  # Spring AI 骨架预留：由他人接入具体模型，这里给占位配置
  ai:
    openai:
      base-url: ${AI_BASE_URL:https://api.openai.com}
      api-key: ${AI_API_KEY:sk-placeholder}
      chat:
        options:
          model: ${AI_MODEL:gpt-4o-mini}
          temperature: 0.7

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.medcare.hda.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 自定义 JWT 配置
hda:
  jwt:
    # 生产环境请替换为更长的随机密钥（至少 32 字节, HS256）
    secret: hda-medcare-health-archive-secret-key-please-change-in-prod-2026
    # 过期时间（毫秒），默认 7 天
    expiration: 604800000
    header: Authorization
    token-prefix: "Bearer "

# Knife4j 文档
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /doc.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.medcare.hda: debug
