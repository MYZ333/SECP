server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: hda-backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hda_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    # 生产环境用环境变量覆盖，勿把真实密码提交进仓库
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  # Spring AI 骨架预留：由他人接入具体模型，这里给占位配置
  ai:
    dashscope:

      # 必须由环境变量注入；仓库中不得保留任何默认密钥。
      api-key: ${ALIYUN_APIKEY:sk-ws-H.EDDXYHY.d7yz.MEQCIH8EtfOR0yo7-hjFqSYZ99iMlawbUBFOVYbIoMwo_PkbAiAw3HHKz7aAV1TtZulq0T3o8oEnzMgqOGGveAKharqmsg}

      chat:
        options:
          model: ${AI_CHAT_MODEL:qwen3.7-plus}
          multi-model: true
          temperature: 0.7
      embedding:
        options:
          model: ${AI_EMBEDDING_MODEL:text-embedding-v4}
          dimensions: 1024
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    vectorstore:
      # Chroma 不可用且只需启动非 AI 功能时，可设置 AI_VECTOR_STORE_TYPE=none 与 RAG_ENABLED=false。
      type: ${AI_VECTOR_STORE_TYPE:chroma}
      chroma:
        client:
          # 必须包含 http:// 或 https://；显式使用 IPv4 避免 Windows 上 localhost 的 IPv4/IPv6 不一致。
          host: ${CHROMA_HOST:http://127.0.0.1}
          port: ${CHROMA_PORT:8000}
        tenant-name: ${CHROMA_TENANT:default_tenant}
        database-name: ${CHROMA_DATABASE:default_database}
        collection-name: ${CHROMA_COLLECTION:medical_knowledge}
        initialize-schema: ${CHROMA_INITIALIZE_SCHEMA:true}

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.medcare.hda.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# HDA 项目自定义配置
hda:
  # 智能体与知识库检索配置
  agent:
    # RAG：文档存储、语义切片和向量检索
    rag:
      enabled: ${RAG_ENABLED:true}
      knowledge-collection: ${CHROMA_KNOWLEDGE_COLLECTION:${CHROMA_COLLECTION:medical_knowledge}}
      # 未显式配置时由后端自动定位项目 data/rag，避免依赖 JVM 启动目录。
      storage-dir: ${RAG_STORAGE_DIR:}
      seed-dir: ${RAG_SEED_DIR:}
      chunking:
        semantic-enabled: ${RAG_SEMANTIC_CHUNKING_ENABLED:true}
        min-chars: ${RAG_CHUNK_MIN_CHARS:280}
        max-chars: ${RAG_CHUNK_MAX_CHARS:1100}
        breakpoint-percentile: ${RAG_CHUNK_BREAKPOINT_PERCENTILE:0.80}
        minimum-break-distance: ${RAG_CHUNK_MINIMUM_BREAK_DISTANCE:0.12}
      vector-top-k: ${RAG_VECTOR_TOP_K:30}
      final-top-k: ${RAG_FINAL_TOP_K:5}
      min-score: ${RAG_MIN_SCORE:0.35}
      query-rewrite:
        enabled: ${RAG_QUERY_REWRITE_ENABLED:true}
        max-keywords: ${RAG_QUERY_REWRITE_MAX_KEYWORDS:6}
      hybrid:
        enabled: ${RAG_HYBRID_ENABLED:true}
        keyword-top-k: ${RAG_KEYWORD_TOP_K:20}
        rerank-top-k: ${RAG_RERANK_TOP_K:12}
        rrf-k: ${RAG_RRF_K:60}
        vector-weight: ${RAG_VECTOR_WEIGHT:1.0}
        keyword-weight: ${RAG_KEYWORD_WEIGHT:0.8}
    # 对向量检索候选结果进行二次排序；配置不完整时自动使用原始向量排序
    rerank:
      enabled: ${RERANK_ENABLED:true}
      workspace-id: ${AI_DASHSCOPE_WORKSPACE_ID:}
      model: ${AI_RERANK_MODEL:qwen3-rerank}
    # 多智能体任务编排
    orchestration:
      worker-timeout-seconds: ${AGENT_WORKER_TIMEOUT_SECONDS:20}
    memory:
      enabled: ${LONG_TERM_MEMORY_ENABLED:true}
      collection-name: ${CHROMA_MEMORY_COLLECTION:long_term_memory}
      recall-top-k: ${LONG_TERM_MEMORY_RECALL_TOP_K:12}
      prompt-limit: ${LONG_TERM_MEMORY_PROMPT_LIMIT:6}
      max-retries: ${LONG_TERM_MEMORY_MAX_RETRIES:3}
    intake:
      enabled: ${AGENT_INTAKE_ENABLED:true}
      max-rounds: ${AGENT_INTAKE_MAX_ROUNDS:6}
    # 医生推荐由现有编排器按需调用，不新增智能体；Tool 固定最多返回3位医生。
    doctor-recommendation:
      enabled: ${DOCTOR_RECOMMENDATION_ENABLED:true}
      limit: ${DOCTOR_RECOMMENDATION_LIMIT:3}
  health-report:
    ai:
      enabled: ${HDA_HEALTH_REPORT_AI_ENABLED:true}
      timeout-seconds: 10
  # 阿里云短信。四项配置齐全时发真实短信；任一为空则为 mock 模式（验证码打印到后端日志）
  sms:
    access-key-id: ${SMS_ACCESS_KEY_ID:}
    access-key-secret: ${SMS_ACCESS_KEY_SECRET:}
    # 短信签名（阿里云控制台审核通过后填入，如：智慧医养）
    sign-name: ${SMS_SIGN_NAME:}
    # 模板 Code（模板内容须含 ${code} 变量，如：SMS_123456789）
    template-code: ${SMS_TEMPLATE_CODE:}
    endpoint: dysmsapi.aliyuncs.com
  # 本地上传目录（头像等），通过 /uploads/** 对外访问
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  # JWT 身份认证与令牌配置
  jwt:
    # 生产环境请通过环境变量 JWT_SECRET 覆盖（至少 32 字节, HS256）
    secret: ${JWT_SECRET:hda-medcare-health-archive-secret-key-please-change-in-prod-2026}
    # access token 过期时间（毫秒），默认 30 分钟
    expiration: 1800000
    # refresh token 过期时间（毫秒），默认 7 天
    refresh-expiration: 604800000
    header: Authorization
    token-prefix: "Bearer "
  # 限流阈值（Redis + Lua 滑动窗口）
  ratelimit:
    # 全局 QPS 兜底（每秒），系统级雪崩保护
    global-qps: ${RATE_LIMIT_GLOBAL_QPS:500}
  # 加解密：RSA 用于密码传输加密，AES 用于敏感字段落库加密
  crypto:
    # RSA 密钥对（PEM/Base64，X.509 公钥 + PKCS#8 私钥）。留空则启动时自动生成。
    # 多节点集群务必配置固定密钥对（放环境变量/配置中心），否则各节点公私钥不一致会导致解密失败。
    rsa-public-key: ${RSA_PUBLIC_KEY:}
    rsa-private-key: ${RSA_PRIVATE_KEY:}
    # AES 敏感字段加密密钥（任意字符串，内部会 SHA-256 派生成 256 位密钥）。生产走环境变量。
    aes-key: ${HDA_AES_KEY:hda-medcare-aes-field-secret-please-change-2026}
    # 存量数据加密迁移开关：首次上线加密后设为 true 跑一次，把老明文加密回填，之后改回 false
    migrate: ${HDA_CRYPTO_MIGRATE:false}

# Knife4j 文档
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /doc.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.medcare.hda: debug
