server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: hda-backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hda_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    # 生产环境用环境变量覆盖，勿把真实密码提交进仓库
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  # Spring AI 骨架预留：由他人接入具体模型，这里给占位配置
  ai:
    dashscope:
      api-key: ${APIKEY}
      chat:
        options:
          model: ${AI_CHAT_MODEL:qwen3.7-plus}
          multi-model: true
          temperature: 0.7
      embedding:
        options:
          model: ${AI_EMBEDDING_MODEL:text-embedding-v4}
          dimensions: 1024
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    vectorstore:
      chroma:
        client:
          # Match start-chroma.ps1: use IPv4 explicitly to avoid localhost IPv4/IPv6 mismatch.
          # Spring AI expects a complete base URL here, including the scheme.
          host: ${CHROMA_HOST:http://127.0.0.1}
          port: ${CHROMA_PORT:8000}
        tenant-name: ${CHROMA_TENANT:default_tenant}
        database-name: ${CHROMA_DATABASE:default_database}
        collection-name: ${CHROMA_COLLECTION:medical_knowledge}
        initialize-schema: ${CHROMA_INITIALIZE_SCHEMA:true}

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.medcare.hda.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 自定义 JWT 配置
hda:
  agent:
    rag:
      enabled: ${RAG_ENABLED:true}
      storage-dir: ${RAG_STORAGE_DIR:../data/rag/documents}
      seed-dir: ${RAG_SEED_DIR:../data/rag/input}
      chunking:
        semantic-enabled: ${RAG_SEMANTIC_CHUNKING_ENABLED:true}
        min-chars: ${RAG_CHUNK_MIN_CHARS:280}
        max-chars: ${RAG_CHUNK_MAX_CHARS:1100}
        breakpoint-percentile: ${RAG_CHUNK_BREAKPOINT_PERCENTILE:0.80}
        minimum-break-distance: ${RAG_CHUNK_MINIMUM_BREAK_DISTANCE:0.12}
      vector-top-k: ${RAG_VECTOR_TOP_K:30}
      final-top-k: ${RAG_FINAL_TOP_K:5}
      min-score: ${RAG_MIN_SCORE:0.35}
    rerank:
      enabled: ${RERANK_ENABLED:true}
      workspace-id: ${AI_DASHSCOPE_WORKSPACE_ID:}
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model: ${AI_RERANK_MODEL:qwen3-rerank}
    orchestration:
      worker-timeout-seconds: ${AGENT_WORKER_TIMEOUT_SECONDS:20}
  # 阿里云短信。四项配置齐全时发真实短信；任一为空则为 mock 模式（验证码打印到后端日志）
  sms:
    access-key-id: ${SMS_ACCESS_KEY_ID:}
    access-key-secret: ${SMS_ACCESS_KEY_SECRET:}
    # 短信签名（阿里云控制台审核通过后填入，如：智慧医养）
    sign-name: ${SMS_SIGN_NAME:}
    # 模板 Code（模板内容须含 ${code} 变量，如：SMS_123456789）
    template-code: ${SMS_TEMPLATE_CODE:}
    endpoint: dysmsapi.aliyuncs.com
  # 本地上传目录（头像等），通过 /uploads/** 对外访问
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  jwt:
    # 生产环境请通过环境变量 JWT_SECRET 覆盖（至少 32 字节, HS256）
    secret: ${JWT_SECRET:hda-medcare-health-archive-secret-key-please-change-in-prod-2026}
    # access token 过期时间（毫秒），默认 30 分钟
    expiration: 1800000
    # refresh token 过期时间（毫秒），默认 7 天
    refresh-expiration: 604800000
    header: Authorization
    token-prefix: "Bearer "
  # 限流阈值（Redis + Lua 滑动窗口）
  ratelimit:
    # 全局 QPS 兜底（每秒），系统级雪崩保护
    global-qps: ${RATE_LIMIT_GLOBAL_QPS:500}
  # 加解密：RSA 用于密码传输加密，AES 用于敏感字段落库加密
  crypto:
    # RSA 密钥对（PEM/Base64，X.509 公钥 + PKCS#8 私钥）。留空则启动时自动生成。
    # 多节点集群务必配置固定密钥对（放环境变量/配置中心），否则各节点公私钥不一致会导致解密失败。
    rsa-public-key: ${RSA_PUBLIC_KEY:}
    rsa-private-key: ${RSA_PRIVATE_KEY:}
    # AES 敏感字段加密密钥（任意字符串，内部会 SHA-256 派生成 256 位密钥）。生产走环境变量。
    aes-key: ${HDA_AES_KEY:hda-medcare-aes-field-secret-please-change-2026}
    # 存量数据加密迁移开关：首次上线加密后设为 true 跑一次，把老明文加密回填，之后改回 false
    migrate: ${HDA_CRYPTO_MIGRATE:false}

# Knife4j 文档
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /doc.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.medcare.hda: debug
