server {
    listen 80;
    server_name _;

    # 上传大小与后端保持一致（application.yml 里 max-request-size 10MB）
    client_max_body_size 10m;

    # Web 管理端（Vue 打包后的静态文件）
    root /usr/share/nginx/html;
    index index.html;

    # 后端接口反向代理：/api/** -> backend:8080
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 头像等上传文件访问：/uploads/** -> backend:8080
    location /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_set_header Host $host;
    }

    # 接口文档（上线后建议关掉或加访问限制）
    location /doc.html {
        proxy_pass http://backend:8080/doc.html;
        proxy_set_header Host $host;
    }
    location /v3/ {
        proxy_pass http://backend:8080/v3/;
        proxy_set_header Host $host;
    }
    location /webjars/ {
        proxy_pass http://backend:8080/webjars/;
        proxy_set_header Host $host;
    }

    # Vue 前端路由（history 模式）兜底
    location / {
        try_files $uri $uri/ /index.html;
    }
}
